<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#070a12"/>
  <!-- Antenna -->
  <line x1="32" y1="8" x2="32" y2="15" stroke="#70c3ff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="7" r="2.5" fill="#70c3ff"/>
  <!-- Head -->
  <rect x="16" y="16" width="32" height="28" rx="6" fill="#0f1624" stroke="#70c3ff" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="24" cy="30" r="4.5" fill="#00e5ff" opacity="0.9"/>
  <circle cx="40" cy="30" r="4.5" fill="#00e5ff" opacity="0.9"/>
  <!-- Eye glow -->
  <circle cx="24" cy="30" r="7" fill="#00e5ff" opacity="0.15"/>
  <circle cx="40" cy="30" r="7" fill="#00e5ff" opacity="0.15"/>
  <!-- Mouth -->
  <rect x="23" y="38" width="18" height="3" rx="1.5" fill="#70c3ff" opacity="0.5"/>
  <!-- Ears -->
  <rect x="11" y="24" width="4" height="12" rx="2" fill="#70c3ff" opacity="0.4"/>
  <rect x="49" y="24" width="4" height="12" rx="2" fill="#70c3ff" opacity="0.4"/>
  <!-- Neck -->
  <rect x="27" y="44" width="10" height="5" rx="2" fill="#0f1624" stroke="#70c3ff" stroke-width="1" opacity="0.6"/>
  <!-- Shoulders -->
  <rect x="18" y="49" width="28" height="7" rx="3.5" fill="#0f1624" stroke="#70c3ff" stroke-width="1"/>
</svg>
