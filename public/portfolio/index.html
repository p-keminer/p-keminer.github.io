<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        font-family: Baskerville, "Palatino Linotype", "Book Antiqua", Georgia, serif;
        background: linear-gradient(160deg, #1a1008 0%, #2e1a0e 50%, #0e0905 100%);
        color: #e8d5b0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        text-align: center;
        padding: 2rem;
        max-width: 600px;
      }

      h1 {
        font-size: 2.4rem;
        font-weight: 400;
        letter-spacing: 0.08em;
        color: #f5e6c8;
        margin-bottom: 1rem;
      }

      .divider {
        width: 80px;
        height: 1px;
        background: linear-gradient(to right, transparent, #c8a96e, transparent);
        margin: 1.2rem auto;
      }

      p {
        font-size: 1rem;
        line-height: 1.75;
        color: #c4a87a;
        letter-spacing: 0.03em;
      }

      .badge {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.4rem 1.1rem;
        border: 1px solid rgba(200, 169, 110, 0.35);
        border-radius: 2px;
        font-size: 0.78rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #c8a96e;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Portfolio</h1>
      <div class="divider"></div>
      <p>Diese Seite befindet sich noch im Aufbau.<br />Hier werden bald Projekte und Arbeiten zu sehen sein.</p>
      <span class="badge">Demnächst verfügbar</span>
    </div>
  </body>
</html>
