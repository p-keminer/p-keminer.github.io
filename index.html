    <div id="app"></div>

    <footer id="site-footer">
      <span>p-keminer</span>
      <span class="site-footer__diamond">◆</span>
      <span>built with Three.js + Vite</span>
    </footer>

    <script>
      // Mobile menu toggle
      const btn = document.getElementById('mobile-menu-btn');
      const panel = document.getElementById('mobile-menu-panel');
      const root = document.getElementById('mobile-menu-root');
      btn?.addEventListener('click', () => {
        const open = panel?.hasAttribute('hidden');
        if (open) { panel?.removeAttribute('hidden'); btn.setAttribute('aria-expanded','true'); }
        else { panel?.setAttribute('hidden',''); btn.setAttribute('aria-expanded','false'); }
      });
      document.addEventListener('pointerdown', (e) => {
        if (!root?.contains(e.target)) { panel?.setAttribute('hidden',''); btn?.setAttribute('aria-expanded','false'); }
      });
    </script>
    <script type="module" src="/src/app/main.ts"></script>
